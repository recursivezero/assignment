<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuotePaper — Quotes into Wallpapers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>

  <!-- Ambient background particles -->
  <div class="ambient-layer" aria-hidden="true">
    <svg class="ambient-svg" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <defs>
        <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.12"/>
          <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#e94560" stop-opacity="0.08"/>
          <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <circle cx="180" cy="150" r="220" fill="url(#glow1)" class="orb orb-1"/>
      <circle cx="1250" cy="700" r="280" fill="url(#glow2)" class="orb orb-2"/>
      <circle cx="900" cy="100" r="160" fill="url(#glow1)" class="orb orb-3"/>

      <!-- Decorative grid dots -->
      <g opacity="0.04" fill="#c9a96e">
        <circle cx="60" cy="60" r="1.5"/><circle cx="120" cy="60" r="1.5"/><circle cx="180" cy="60" r="1.5"/><circle cx="240" cy="60" r="1.5"/><circle cx="300" cy="60" r="1.5"/>
        <circle cx="60" cy="120" r="1.5"/><circle cx="120" cy="120" r="1.5"/><circle cx="180" cy="120" r="1.5"/><circle cx="240" cy="120" r="1.5"/><circle cx="300" cy="120" r="1.5"/>
        <circle cx="60" cy="180" r="1.5"/><circle cx="120" cy="180" r="1.5"/><circle cx="180" cy="180" r="1.5"/><circle cx="240" cy="180" r="1.5"/><circle cx="300" cy="180" r="1.5"/>
        <circle cx="1100" cy="800" r="1.5"/><circle cx="1160" cy="800" r="1.5"/><circle cx="1220" cy="800" r="1.5"/><circle cx="1280" cy="800" r="1.5"/><circle cx="1340" cy="800" r="1.5"/>
        <circle cx="1100" cy="840" r="1.5"/><circle cx="1160" cy="840" r="1.5"/><circle cx="1220" cy="840" r="1.5"/><circle cx="1280" cy="840" r="1.5"/><circle cx="1340" cy="840" r="1.5"/>
      </g>

      <!-- Thin geometric lines -->
      <line x1="0" y1="450" x2="80" y2="450" stroke="#c9a96e" stroke-width="0.5" opacity="0.15"/>
      <line x1="1320" y1="300" x2="1400" y2="300" stroke="#c9a96e" stroke-width="0.5" opacity="0.15"/>
      <line x1="700" y1="0" x2="700" y2="50" stroke="#c9a96e" stroke-width="0.5" opacity="0.1"/>
    </svg>
  </div>

  <!-- Header -->
  <header class="site-header">
    <div class="header-left">
      <!-- Inline SVG logo icon -->
      <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="4" width="28" height="28" rx="4" fill="none" stroke="#c9a96e" stroke-width="1.2"/>
        <rect x="8" y="8" width="20" height="20" rx="2" fill="none" stroke="#c9a96e" stroke-width="0.6" opacity="0.4"/>
        <line x1="10" y1="14" x2="26" y2="14" stroke="#c9a96e" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="10" y1="18" x2="22" y2="18" stroke="#c9a96e" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
        <line x1="10" y1="22" x2="18" y2="22" stroke="#c9a96e" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
      </svg>
      <div class="logo-text">
        <span class="logo">QuotePaper</span>
        <span class="tagline">Turn words into wallpapers</span>
      </div>
    </div>

    <div class="header-badges">
      <span class="badge">
        <svg viewBox="0 0 12 12" fill="currentColor"><circle cx="6" cy="6" r="3"/></svg>
        No signup needed
      </span>
      <span class="badge">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6l3 3 5-5"/></svg>
        Free forever
      </span>
    </div>
  </header>

  <main class="app-layout">

    <!-- LEFT: Controls -->
    <aside class="controls-panel">

      <section class="control-group">
        <label class="label">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h10M2 7h7M2 11h5"/></svg>
          Quote Text
        </label>
        <textarea id="quoteInput" class="input-text" rows="4" placeholder="Type your quote here…">"The only way to do great work is to love what you do."</textarea>
        <label class="label" style="margin-top:10px;">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="5" r="2.5"/><path d="M2 12c0-2.8 2.2-4.5 5-4.5s5 1.7 5 4.5"/></svg>
          Author
        </label>
        <input id="authorInput" class="input-field" type="text" placeholder="— Author name" value="— Steve Jobs" />
      </section>

      <section class="control-group">
        <label class="label">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="12" height="12" rx="2"/><path d="M4 7h6M4 4h6M4 10h4"/></svg>
          Background
        </label>
        <div class="bg-grid" id="bgOptions">
          <button class="bg-btn active" data-bg="gradient-dusk" title="Dusk">
            <span class="swatch" style="background:linear-gradient(135deg,#1a1a2e,#0f3460,#e94560)"></span>
            <span class="swatch-name">Dusk</span>
          </button>
          <button class="bg-btn" data-bg="gradient-paper" title="Paper">
            <span class="swatch" style="background:linear-gradient(135deg,#f5f0e8,#e8dcc8,#d4c5a9)"></span>
            <span class="swatch-name">Paper</span>
          </button>
          <button class="bg-btn" data-bg="gradient-forest" title="Forest">
            <span class="swatch" style="background:linear-gradient(135deg,#0d1b2a,#1b4332,#40916c)"></span>
            <span class="swatch-name">Forest</span>
          </button>
          <button class="bg-btn" data-bg="gradient-rose" title="Rose">
            <span class="swatch" style="background:linear-gradient(135deg,#2d0a1e,#c2185b,#f48fb1)"></span>
            <span class="swatch-name">Rose</span>
          </button>
          <button class="bg-btn" data-bg="gradient-slate" title="Slate">
            <span class="swatch" style="background:linear-gradient(135deg,#1c1c1c,#4a4a4a,#6b6b6b)"></span>
            <span class="swatch-name">Slate</span>
          </button>
          <button class="bg-btn" data-bg="gradient-ocean" title="Ocean">
            <span class="swatch" style="background:linear-gradient(135deg,#0c0c3e,#0077b6,#90e0ef)"></span>
            <span class="swatch-name">Ocean</span>
          </button>
          <button class="bg-btn" data-bg="gradient-amber" title="Amber">
            <span class="swatch" style="background:linear-gradient(135deg,#1a0a00,#e65c00,#f9a825)"></span>
            <span class="swatch-name">Amber</span>
          </button>
          <button class="bg-btn" data-bg="gradient-ivory" title="Ivory">
            <span class="swatch" style="background:linear-gradient(135deg,#fefae0,#faedcd,#e9c46a)"></span>
            <span class="swatch-name">Ivory</span>
          </button>
        </div>
      </section>

      <section class="control-group">
        <label class="label">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="12" height="12" rx="1.5"/><rect x="3" y="3" width="3" height="3" rx="0.5" fill="currentColor" opacity="0.4"/></svg>
          Layout
        </label>
        <div class="layout-grid" id="layoutOptions">
          <button class="layout-btn active" data-layout="centered">
            <svg viewBox="0 0 44 32">
              <rect x="4" y="12" width="36" height="3" rx="1.5" fill="currentColor"/>
              <rect x="10" y="18" width="24" height="2" rx="1" fill="currentColor" opacity="0.6"/>
              <rect x="15" y="23" width="14" height="1.5" rx="0.75" fill="currentColor" opacity="0.35"/>
            </svg>
            <span>Center</span>
          </button>
          <button class="layout-btn" data-layout="left-aligned">
            <svg viewBox="0 0 44 32">
              <rect x="4" y="12" width="28" height="3" rx="1.5" fill="currentColor"/>
              <rect x="4" y="18" width="20" height="2" rx="1" fill="currentColor" opacity="0.6"/>
              <rect x="4" y="23" width="12" height="1.5" rx="0.75" fill="currentColor" opacity="0.35"/>
            </svg>
            <span>Left</span>
          </button>
          <button class="layout-btn" data-layout="bottom-left">
            <svg viewBox="0 0 44 32">
              <rect x="4" y="22" width="28" height="3" rx="1.5" fill="currentColor"/>
              <rect x="4" y="27" width="18" height="2" rx="1" fill="currentColor" opacity="0.6"/>
            </svg>
            <span>Bottom</span>
          </button>
          <button class="layout-btn" data-layout="top-right">
            <svg viewBox="0 0 44 32">
              <rect x="12" y="5" width="28" height="3" rx="1.5" fill="currentColor"/>
              <rect x="20" y="11" width="20" height="2" rx="1" fill="currentColor" opacity="0.6"/>
            </svg>
            <span>Top-R</span>
          </button>
        </div>
      </section>

      <section class="control-group">
        <label class="label">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 11V3l5 6 5-6v8"/></svg>
          Font Style
        </label>
        <div class="font-grid" id="fontOptions">
          <button class="font-btn active" data-font="playfair">
            <span class="font-preview" style="font-family:'Playfair Display';font-style:italic">Aa</span>
            <span class="font-name">Playfair</span>
          </button>
          <button class="font-btn" data-font="cormorant">
            <span class="font-preview" style="font-family:'Cormorant Garamond';font-style:italic">Aa</span>
            <span class="font-name">Cormorant</span>
          </button>
          <button class="font-btn" data-font="mono">
            <span class="font-preview" style="font-family:'DM Mono'">Aa</span>
            <span class="font-name">Mono</span>
          </button>
        </div>
      </section>

      <section class="control-group">
        <label class="label">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="4" width="12" height="8" rx="1.5"/><path d="M4 4V2.5a1 1 0 011-1h4a1 1 0 011 1V4"/></svg>
          Canvas Size
        </label>
        <div class="size-grid" id="sizeOptions">
          <button class="size-btn active" data-size="16x9">
            <svg viewBox="0 0 32 20" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="30" height="18" rx="2"/></svg>
            <span>16:9</span>
          </button>
          <button class="size-btn" data-size="9x16">
            <svg viewBox="0 0 20 32" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="18" height="30" rx="2"/></svg>
            <span>9:16</span>
          </button>
          <button class="size-btn" data-size="1x1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="22" height="22" rx="2"/></svg>
            <span>1:1</span>
          </button>
          <button class="size-btn" data-size="4x3">
            <svg viewBox="0 0 28 22" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="26" height="20" rx="2"/></svg>
            <span>4:3</span>
          </button>
        </div>
      </section>

      <section class="control-group">
        <label class="label">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2h10v10H2z"/><path d="M5 2v10M2 5h10"/></svg>
          Decoration
        </label>
        <div class="decor-grid" id="decorOptions">
          <button class="decor-btn active" data-decor="line">
            <svg viewBox="0 0 40 24" fill="none" stroke="currentColor" stroke-width="1.2">
              <line x1="8" y1="9" x2="32" y2="9"/>
              <line x1="5" y1="13" x2="35" y2="13"/>
              <line x1="8" y1="17" x2="28" y2="17"/>
              <line x1="12" y1="20" x2="24" y2="20" stroke-width="0.6" opacity="0.5"/>
            </svg>
            <span>Line</span>
          </button>
          <button class="decor-btn" data-decor="quotes">
            <svg viewBox="0 0 40 24" fill="currentColor">
              <path d="M8 6c-2 0-4 2-4 4s2 4 4 4v4l4-4c0 0 0-8-4-8z" opacity="0.7"/>
              <path d="M22 6c-2 0-4 2-4 4s2 4 4 4v4l4-4c0 0 0-8-4-8z" opacity="0.7"/>
            </svg>
            <span>Marks</span>
          </button>
          <button class="decor-btn" data-decor="minimal">
            <svg viewBox="0 0 40 24" fill="none" stroke="currentColor" stroke-width="1">
              <line x1="10" y1="12" x2="30" y2="12"/>
            </svg>
            <span>Minimal</span>
          </button>
          <button class="decor-btn" data-decor="frame">
            <svg viewBox="0 0 40 24" fill="none" stroke="currentColor" stroke-width="1">
              <rect x="4" y="3" width="32" height="18" rx="1"/>
              <rect x="7" y="6" width="26" height="12" rx="0.5" opacity="0.4"/>
            </svg>
            <span>Frame</span>
          </button>
        </div>
      </section>

      <div class="action-row">
        <button id="randomQuoteBtn" class="btn-secondary">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8a6 6 0 0110.4-4M14 8a6 6 0 01-10.4 4"/><polyline points="11,2 13.4,4 11,6"/><polyline points="5,10 2.6,12 5,14"/></svg>
          Inspire Me
        </button>
        <button id="downloadBtn" class="btn-primary">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 2v8M5 7l3 3 3-3"/><path d="M3 12h10"/></svg>
          Download
        </button>
      </div>

    </aside>

    <!-- RIGHT: Preview -->
    <div class="preview-wrapper">

      <!-- Decorative top-right illustration -->
      <div class="preview-deco-art" aria-hidden="true">
        <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="80" stroke="#c9a96e" stroke-width="0.5" opacity="0.15"/>
          <circle cx="100" cy="100" r="60" stroke="#c9a96e" stroke-width="0.5" opacity="0.1"/>
          <circle cx="100" cy="100" r="40" stroke="#c9a96e" stroke-width="0.5" opacity="0.08"/>
          <path d="M100 20 L100 180 M20 100 L180 100" stroke="#c9a96e" stroke-width="0.4" opacity="0.1"/>
          <path d="M43.4 43.4 L156.6 156.6 M156.6 43.4 L43.4 156.6" stroke="#c9a96e" stroke-width="0.3" opacity="0.08"/>
          <circle cx="100" cy="20" r="3" fill="#c9a96e" opacity="0.3"/>
          <circle cx="100" cy="180" r="3" fill="#c9a96e" opacity="0.3"/>
          <circle cx="20" cy="100" r="3" fill="#c9a96e" opacity="0.3"/>
          <circle cx="180" cy="100" r="3" fill="#c9a96e" opacity="0.3"/>
          <circle cx="100" cy="100" r="6" stroke="#c9a96e" stroke-width="1" opacity="0.25"/>
          <circle cx="100" cy="100" r="2" fill="#c9a96e" opacity="0.4"/>
        </svg>
      </div>

      <div class="preview-header">
        <span class="preview-label">
          <svg viewBox="0 0 12 12" fill="currentColor"><circle cx="6" cy="6" r="3"/></svg>
          Live Preview
        </span>
        <span class="preview-hint">Changes apply instantly</span>
      </div>

      <div class="canvas-outer" id="canvasOuter">
        <div class="wallpaper-canvas gradient-dusk layout-centered font-playfair decor-line" id="wallpaperCanvas">

          <!-- Canvas background texture overlay -->
          <div class="canvas-texture" aria-hidden="true"></div>

          <!-- Corner ornaments (SVG inline) -->
          <svg class="corner-ornament top-left" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 20 L2 2 L20 2" stroke="currentColor" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
            <circle cx="2" cy="2" r="1.5" fill="currentColor" opacity="0.4"/>
          </svg>
          <svg class="corner-ornament top-right" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M38 20 L38 2 L20 2" stroke="currentColor" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
            <circle cx="38" cy="2" r="1.5" fill="currentColor" opacity="0.4"/>
          </svg>
          <svg class="corner-ornament bottom-left" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 20 L2 38 L20 38" stroke="currentColor" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
            <circle cx="2" cy="38" r="1.5" fill="currentColor" opacity="0.4"/>
          </svg>
          <svg class="corner-ornament bottom-right" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M38 20 L38 38 L20 38" stroke="currentColor" stroke-width="0.8" opacity="0.4" stroke-linecap="round"/>
            <circle cx="38" cy="38" r="1.5" fill="currentColor" opacity="0.4"/>
          </svg>

          <div class="canvas-decor" id="canvasDecor"></div>

          <div class="canvas-content" id="canvasContent">
            <div class="canvas-quote" id="canvasQuote">"The only way to do great work is to love what you do."</div>
            <div class="canvas-author" id="canvasAuthor">— Steve Jobs</div>
          </div>

          <div class="canvas-watermark">QuotePaper</div>
        </div>
      </div>

      <!-- Feature pills below preview -->
      <div class="feature-pills">
        <span class="pill">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="10" height="7" rx="1"/><path d="M4 3V2a2 2 0 014 0v1"/></svg>
          High-res export
        </span>
        <span class="pill">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 1v10M1 6h10"/></svg>
          8 themes
        </span>
        <span class="pill">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="5"/><path d="M6 3v3l2 2"/></svg>
          Instant preview
        </span>
        <span class="pill">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 9l3-3 2 2 4-5"/></svg>
          4 sizes
        </span>
      </div>

    </div>
  </main>

  <script src="src/quotes.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
